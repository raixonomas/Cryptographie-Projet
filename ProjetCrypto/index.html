<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Secure WebRTC Chat</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <div class="container">
    <h2>🔐 Secure WebRTC Chat</h2>

    <input id="name" placeholder="Your name" />
    <button id="connect-btn" onclick="connect()">Connect</button>

    <h3>Online Users</h3>
    <div id="users"></div>
    <hr>
  </div>
  <div class="main-container">
    <div class="disc-list-container">
      <h2>Discussions</h2>
      <ul id="disc-list" class="disc-list"></ul>
    </div>
    <div class="chat">
      <div id="chat"></div>

      <input id="msg" placeholder="message..." />
      <button id="message-btn" onclick="sendMessage()">Send</button>
    </div>
  </div>
  <button id="testbtn">Add discussion</button>

<script src="crypto.js"></script>
<script src="ws.js"></script>
<script src="user.js"></script>
<script src="webrtc.js"></script>
<script src="app.js"></script>

</body>
</html>
